<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EcomQA</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>

<div class="sidebar">

  <!-- Header -->
  <header class="sidebar-header">
    <div class="brand"><span class="brand-icon">⚡</span><span class="brand-text">EcomQA</span></div>
    <button id="closeBtn" class="icon-btn" title="Close">✕</button>
  </header>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="ask">Ask</button>
    <button class="tab-btn" data-tab="compare">Compare <span id="savedBadge" class="badge-count">0</span></button>
  </div>

  <!-- ===================== ASK TAB ===================== -->
  <div class="tab-pane active" id="pane-ask">

    <div class="product-info" id="productInfo">
      <div class="status-indicator" id="statusDot"></div>
      <div class="status-text" id="statusText">Detecting product…</div>
    </div>

    <div class="ask-box">
      <textarea id="questionInput" rows="2" placeholder="Ask anything about this product…"></textarea>
      <button id="askBtn" class="primary-btn" disabled>Ask</button>
    </div>

    <div class="quick-prompts">
      <button class="chip" data-q="What are the key specifications?">Key specs</button>
      <button class="chip" data-q="What do customers say about the quality?">Quality</button>
      <button class="chip" data-q="Is it worth the price?">Worth it?</button>
      <button class="chip" data-q="What is the battery life?">Battery</button>
    </div>

    <button id="saveProductBtn" class="save-btn" disabled>+ Save for comparison</button>

    <div class="answer-container" id="answerContainer"></div>
  </div>

  <!-- ===================== COMPARE TAB ===================== -->
  <div class="tab-pane" id="pane-compare">

    <div class="saved-list-header">
      <span>Saved products</span>
      <button id="clearAllBtn" class="link-btn">Clear all</button>
    </div>
    <div class="saved-list" id="savedList">
      <div class="empty-msg">No products saved yet. Go to a product page, click "Save for comparison".</div>
    </div>

    <div class="compare-ask-box">
      <textarea id="compareQuestion" rows="2" placeholder="Ask one question for all saved products…"></textarea>
      <button id="compareBtn" class="primary-btn" disabled>Compare</button>
    </div>

    <div class="answer-container" id="compareResults"></div>
  </div>

  <!-- Footer -->
  <footer class="sidebar-footer">
    <span id="backendStatus" class="backend-indicator">●</span>
    <span id="backendUrl" class="backend-url">—</span>
  </footer>

</div>

<script src="sidebar.js"></script>
</body>
</html>
