{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to save and view your query history</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form id="loginForm" class="auth-form">
      <label class="form-label">Username</label>
      <input name="username" type="text" class="input-field" placeholder="your_username" required />

      <label class="form-label">Password</label>
      <input name="password" type="password" class="input-field" placeholder="••••••••" required />

      <button type="submit" class="btn btn-primary btn-full">Log in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Sign up free</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = { username: fd.get("username"), password: fd.get("password") };
  const res  = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (data.success) window.location.href = data.redirect || "/";
  else document.querySelector(".auth-form").insertAdjacentHTML("afterbegin",
    `<div class="alert alert-error">${data.error}</div>`);
});
</script>
{% endblock %}
